# Google Cloud Build 설정 파일
# Static 사이트 빌드 후 Cloud Storage에 배포

steps:
  # 1. 의존성 설치
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    
  # 2. 메뉴 데이터 수집 + Static 빌드 (prebuild가 자동 실행됨)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'NODE_ENV=production'
    secretEnv: ['GEMINI_API_KEY']
  
  # 3. 404.html 생성 (Next.js export는 404/index.html을 생성)
  - name: 'bash'
    args:
      - '-c'
      - |
        if [ -f out/404/index.html ]; then
          cp out/404/index.html out/404.html
        fi
  
  # 4. Cloud Storage에 업로드 (rsync로 변경된 파일만 업로드)
  - name: 'gcr.io/cloud-builders/gsutil'
    args: 
      - '-m'
      - 'rsync'
      - '-r'
      - '-c'  # checksum 비교로 변경된 파일만 업로드
      - '-d'  # 삭제된 파일 제거
      - './out/'
      - 'gs://gasan-yamyam-web/'
  
  # 5. 캐시 헤더 설정 (HTML은 짧게, 정적 파일은 길게)
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'setmeta'
      - '-h'
      - 'Cache-Control:public, max-age=300'  # 5분
      - 'gs://gasan-yamyam-web/**.html'
  
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'setmeta'
      - '-h'
      - 'Cache-Control:public, max-age=31536000'  # 1년
      - 'gs://gasan-yamyam-web/_next/**'
  
  # 6. CDN 캐시 무효화 (빌드 직후 새 콘텐츠 즉시 반영)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'url-maps'
      - 'invalidate-cdn-cache'
      - 'gasan-yamyam-url-map'
      - '--path'
      - '/*'
      - '--async'

# 빌드 옵션
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Secret Manager 설정
availableSecrets:
  secretManager:
    - versionName: projects/gasan-yamyam/secrets/gemini-api-key/versions/latest
      env: 'GEMINI_API_KEY'

# 타임아웃 설정 (메뉴 수집 시간 고려)
timeout: '1200s'  # 20분