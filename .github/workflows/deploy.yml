name: Rebuild and Deploy

on:
  # 매일 평일 오전 10시 10분에 자동 실행 (KST 기준, UTC로는 01:10)
  schedule:
    - cron: '10 1 * * 1-5'  # 월-금 01:10 UTC (10:10 KST)
  
  # 수동 실행 가능
  workflow_dispatch:
  
  # main 브랜치에 push될 때도 실행
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**.md'

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "🚀 Triggering Vercel deployment..."
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✅ Deployment triggered successfully!"
          echo "📊 Check deployment status: https://vercel.com/dashboard"

# 참고: Vercel Deploy Hook URL 설정 방법
# 1. Vercel Dashboard → 프로젝트 → Settings → Git
# 2. "Deploy Hooks" 섹션에서 새 Hook 생성
# 3. Hook URL을 GitHub Secrets에 VERCEL_DEPLOY_HOOK으로 저장

