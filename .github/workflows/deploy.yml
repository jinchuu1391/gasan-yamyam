name: Daily Menu Update

on:
  # 매일 평일 오전 10시 10분에 자동 실행 (KST 기준, UTC로는 01:10)
  schedule:
    - cron: '10 1 * * 1-5'  # 월-금 01:10 UTC (10:10 KST)
  
  # 수동 실행 가능
  workflow_dispatch:
  
  # push 트리거 제거 - Vercel 자동 배포로 처리

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "🚀 Triggering Vercel deployment for daily menu update..."
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✅ Deployment triggered successfully!"
          echo "📊 Check deployment status: https://vercel.com/dashboard"

# 평일 10:10에만 자동 재빌드
# Push 시에는 Vercel이 자동으로 배포


