# DEPRECATED: Google Cloud Scheduler로 대체됨
# 이 workflow는 비활성화되었습니다.
# Google Cloud Scheduler가 동일한 기능을 무료로 제공합니다.

name: Daily Menu Collection (DISABLED)

on:
  # schedule 비활성화 - Google Cloud Scheduler 사용
  # schedule:
  #   # 평일(월-금) 오전 10시 10분 (KST) = UTC 오전 1시 10분
  #   - cron: '10 1 * * 1-5'
  
  # 수동 실행만 가능하도록 유지
  workflow_dispatch:

jobs:
  collect-menus:
    runs-on: ubuntu-latest
    
    steps:
      - name: Collect Restaurant Menus
        run: |
          echo "🍽️ Starting menu collection..."
          
          # API 호출 (배포된 앱의 URL로 변경 필요)
          response=$(curl -s -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Menu-Collector" \
            "${{ secrets.APP_URL || 'https://your-app.vercel.app' }}/api/collect-menus")
          
          http_code="${response: -3}"
          body="${response%???}"
          
          echo "HTTP Status Code: $http_code"
          echo "Response Body: $body"
          
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Menu collection completed successfully!"
          else
            echo "❌ Menu collection failed with HTTP $http_code"
            exit 1
          fi

      - name: Log Completion
        if: always()
        run: |
          echo "📅 Menu collection job completed at $(date -u)"
          echo "🕐 Next run: Weekdays at 10:10 AM KST (01:10 UTC)"